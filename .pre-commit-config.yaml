# 커밋 직전에 자동으로 포맷·린트·락 검사를 돌린다.
# 설치(1회): uv run pre-commit install
#
# 로컬 훅으로 uv 가 고정한(uv.lock) ruff 를 직접 호출한다 → 도구 버전 드리프트가 없다.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        require_serial: true
      - id: uv-lock
        name: uv lock check
        entry: uv lock --check
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$
