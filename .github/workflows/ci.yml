name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # uv.lock 기준으로 정확히 설치(잠금 어긋나면 실패) → 모두와 동일 환경
      - name: Install dependencies (locked)
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy

      - name: Import boundaries (THE ONE RULE)
        run: uv run lint-imports

      - name: Tests
        run: uv run pytest
